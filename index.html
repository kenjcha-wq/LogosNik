<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogosNik | 语言知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f4f0; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; height: 100vh; color: #333; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .notebook-case { background-color: #fdfdfb; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border-radius: 8px; border: 1px solid #e5e5e0; }
        .notebook-paper { background-image: linear-gradient(#f1f1f1 1px, transparent 1px); background-size: 100% 2.5rem; line-height: 2.5rem; }
        .margin-notes { width: 240px; background: rgba(250,250,248,0.5); border-left: 1px dashed #e5e5e0; }
        .point-card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid #eee; transition: all 0.2s; }
        .point-card:hover { border-color: #333; transform: translateX(4px); }
        .lib-nav-item { cursor: pointer; padding: 6px 14px; border-radius: 20px; font-size: 10px; font-weight: bold; background: #f4f4f0; color: #888; }
        .lib-nav-item.active { background: #333; color: #fff; }
        .kana-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .kana-box { padding: 8px 2px; text-align: center; background: #f9f9f9; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .kana-box:hover { border-color: #ddd; background: #fff; }
        .header-btn { p-1.5 hover:bg-zinc-200 rounded-full transition-all text-zinc-500 hover:text-black cursor-pointer; }
    </style>
</head>
<body>

    <div class="h-screen flex flex-col p-4 gap-4">
        <header class="h-12 flex justify-between items-center px-2">
            <div class="flex items-center gap-4 text-left">
                <div class="flex flex-col leading-tight cursor-pointer" onclick="goHome()">
                    <span class="text-xl font-bold tracking-[0.2em] font-serif uppercase text-zinc-800 flex items-center gap-2">
                        LogosNik 
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </span>
                    <span class="text-[14px] font-bold text-zinc-500 tracking-wider">语言知识库</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="flex bg-zinc-100 rounded-full p-1 mr-2">
                    <button onclick="pushToCloud()" class="p-1.5 hover:bg-white rounded-full" title="上传"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
                    <button onclick="pullFromCloud()" class="p-1.5 hover:bg-white rounded-full" title="拉取"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
                </div>
                <button onclick="exportMarkdown()" class="text-[10px] px-4 py-2 bg-green-50 text-green-700 rounded-full font-bold uppercase hover:bg-green-100 transition-all">Export MD</button>
                <button onclick="openGenerateModal()" class="text-[10px] px-4 py-2 bg-zinc-800 text-white rounded-full font-bold shadow-md uppercase hover:bg-black transition-all">Generate</button>
                <button onclick="openSettings()" class="p-2 text-zinc-400 hover:text-black"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
            </div>
        </header>

        <div class="flex-1 flex gap-5 overflow-hidden">
            <aside class="w-64 flex flex-col gap-4 overflow-hidden">
                <div class="flex-1 bg-white/40 backdrop-blur rounded-2xl p-4 border border-white/60 flex flex-col overflow-hidden shadow-sm text-left">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-bold text-zinc-400 tracking-widest uppercase">Analysis</h3>
                        <button onclick="openHistory()" class="text-[10px] font-bold text-zinc-300 hover:text-black uppercase">仓库</button>
                    </div>
                    <div id="points-list" class="flex-1 overflow-y-auto no-scrollbar">
                        </div>
                </div>
                <button onclick="openLibrary()" class="h-16 bg-zinc-800 text-white rounded-2xl p-4 flex items-center justify-center gap-3 hover:bg-black transition-all shadow-lg">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    <span class="text-[11px] font-bold tracking-[0.2em] uppercase">Library</span>
                </button>
            </aside>

            <main class="flex-1 notebook-case flex overflow-hidden relative">
                <div class="flex-1 flex flex-col overflow-hidden relative border-r border-zinc-50">
                    <div class="h-12"></div>
                    <div class="flex-1 overflow-y-auto notebook-paper px-12 py-8 no-scrollbar relative text-left">
                        <div class="flex justify-between items-center mb-2">
                            <div id="timestamp" class="text-[9px] text-zinc-300 font-mono"></div>
                            <div id="display-user-name" class="text-[9px] text-zinc-400 font-bold uppercase">Researcher</div>
                        </div>
                        <input type="text" id="note-title" placeholder="Note Title" class="w-full text-2xl font-bold bg-transparent border-none outline-none mb-4 font-serif tracking-tight">
                        <textarea id="note-editor" oninput="saveCurrentNote()" class="w-full h-full bg-transparent border-none outline-none text-zinc-700 resize-none overflow-hidden" placeholder="在这里沉淀思考..."></textarea>
                    </div>
                </div>
                <div class="margin-notes flex flex-col overflow-hidden bg-[#fafafa]/30 text-left">
                    <div class="p-4 border-b border-zinc-100 flex justify-between items-center">
                        <span class="text-[9px] font-bold text-zinc-400 tracking-[0.2em] uppercase">Fragments</span>
                        <span id="fragment-count" class="text-[9px] font-mono text-zinc-300">0</span>
                    </div>
                    <div id="fragment-container" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar"></div>
                </div>
            </main>

            <aside class="w-80 flex flex-col gap-4 overflow-hidden text-left">
                <div id="source-panel" class="flex-1 bg-white rounded-2xl p-6 shadow-sm border border-zinc-100 flex flex-col overflow-hidden relative">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-zinc-50">
                        <div class="flex items-center gap-2">
                            <h3 id="source-title" class="text-[10px] font-bold text-zinc-400 tracking-widest uppercase">Active Source</h3>
                            <button id="back-tag" onclick="backToSource()" class="hidden bg-zinc-800 text-white px-2 py-0.5 rounded text-[9px] font-bold">返回课题</button>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="speakContent()" class="text-zinc-300 hover:text-black"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>
                            <button onclick="goHome()" class="text-zinc-300 hover:text-red-400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                        </div>
                    </div>

                    <div id="library-tabs" class="hidden mb-6 flex gap-2 flex-wrap">
                        <span class="lib-nav-item active" onclick="switchLib('kana')">五十音</span>
                        <span class="lib-nav-item" onclick="switchLib('ref')">参考库</span>
                        <span class="lib-nav-item" onclick="switchLib('docs')">上传文档</span>
                    </div>

                    <div id="textbook-content" class="flex-1 overflow-y-auto text-[14px] leading-[1.8] text-zinc-600 no-scrollbar font-serif">
                        空白界面。
                    </div>
                </div>
                
                <div class="h-64 bg-zinc-900 rounded-[2.5rem] p-5 text-white flex flex-col shadow-xl">
                    <div id="chat-history" class="flex-1 overflow-y-auto text-[11px] space-y-3 mb-3 no-scrollbar opacity-80 leading-relaxed pr-2"></div>
                    <div class="relative">
                        <input id="chat-input" type="text" onkeypress="if(event.key==='Enter') askNik()" class="w-full bg-white/10 rounded-2xl p-3 text-[11px] outline-none" placeholder="Ask Nik...">
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="history-modal" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeHistory()">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-10 shadow-2xl text-left">
            <h3 class="text-xs font-bold mb-6 uppercase text-zinc-400 tracking-widest border-b pb-4">Warehouse</h3>
            <div id="warehouse-list" class="max-h-96 overflow-y-auto space-y-2 no-scrollbar"></div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeSettings()">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-10 shadow-2xl text-left">
            <h3 class="text-xs font-bold mb-8 uppercase text-zinc-400 tracking-widest border-b pb-4">Settings</h3>
            <div class="space-y-4">
                <input id="set-user-name" type="text" class="w-full p-4 bg-zinc-50 rounded-2xl text-xs border border-zinc-100 outline-none" placeholder="你的称呼">
                <input id="set-sync-id" type="text" class="w-full p-4 bg-zinc-50 rounded-2xl text-xs border border-zinc-100 outline-none" placeholder="Sync ID">
                <input id="set-worker-url" type="text" class="w-full p-4 bg-zinc-50 rounded-2xl text-xs border border-zinc-100 outline-none" placeholder="Worker URL">
                <div class="grid grid-cols-2 gap-4">
                    <input id="set-model" type="text" class="p-4 bg-zinc-50 rounded-2xl text-xs border border-zinc-100" placeholder="Model">
                    <input id="set-key" type="password" class="p-4 bg-zinc-50 rounded-2xl text-xs border border-zinc-100" placeholder="Key">
                </div>
                <button onclick="saveSettings()" class="w-full py-5 bg-zinc-900 text-white rounded-[1.5rem] font-bold text-xs uppercase shadow-lg">Apply</button>
            </div>
        </div>
    </div>

    <div id="generate-modal" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeGenerateModal()">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-10 shadow-2xl">
            <input id="topic-input" type="text" class="w-full p-4 bg-zinc-50 rounded-2xl text-xs border border-zinc-100 outline-none mb-6" placeholder="输入你想研究的课题...">
            <button onclick="generateLesson()" class="w-full py-4 bg-zinc-900 text-white rounded-2xl font-bold text-xs uppercase">Start</button>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('ln_v3_config')) || { userName: 'Researcher', host: 'https://api.deepseek.com/v1', model: 'deepseek-chat', key: '', syncId: '', workerUrl: '' };
        let warehouse = JSON.parse(localStorage.getItem('ln_warehouse')) || [];
        let currentId = localStorage.getItem('ln_current_id') || null;

        const KANA_DATA = {
            seion: [['あ','ア','a'],['い','イ','i'],['う','ウ','u'],['え','エ','e'],['お','オ','o'],['か','カ','ka'],['き','キ','ki'],['く','ク','ku'],['け','ケ','ke'],['こ','コ','ko'],['さ','サ','sa'],['し','シ','shi'],['す','ス','su'],['せ','セ','se'],['そ','ソ','so'],['た','タ','ta'],['ち','チ','chi'],['つ','ツ','tsu'],['て','テ','te'],['と','ト','to'],['な','ナ','na'],['に','ニ','ni'],['ぬ','ヌ','nu'],['ね','ネ','ne'],['の','ノ','no'],['は','ハ','ha'],['ひ','ヒ','hi'],['ふ','フ','fu'],['へ','ヘ','he'],['ほ','ホ','ho'],['ま','マ','ma'],['み','ミ','mi'],['む','ム','mu'],['め','メ','me'],['も','モ','mo'],['や','ヤ','ya'],['','',''],['ゆ','ユ','yu'],['','',''],['よ','ヨ','yo'],['ら','ラ','ra'],['り','利','ri'],['る','ル','ru'],['れ','レ','re'],['ろ','ロ','ro'],['わ','ワ','wa'],['','',''],['','',''],['','',''],['を','ヲ','wo'],['ん','ン','n']],
            dakuon: [['が','ガ','ga'],['ぎ','ギ','gi'],['ぐ','グ','gu'],['げ','格','ge'],['ご','ゴ','go'],['ざ','ザ','za'],['じ','ジ','ji'],['ず','ズ','zu'],['ぜ','ゼ','ze'],['ぞ','ゾ','zo'],['だ','ダ','da'],['ぢ','ヂ','ji'],['づ','ヅ','zu'],['出','デ','de'],['ど','ド','do'],['ば','バ','ba'],['び','ビ','bi'],['ぶ','ブ','bu'],['べ','ベ','be'],['ぼ','ボ','bo'],['ぱ','帕','pa'],['ぴ','皮','pi'],['ぷ','普','pu'],['ぺ','培','pe'],['ぽ','坡','po']],
            youon: [['きゃ','キャ','kya'],['きゅ','キュ','kyu'],['きょ','キョ','kyo'],['しゃ','シャ','sha'],['しゅ','シュ','shu'],['しょ','ショ','sho'],['ちゃ','チャ','cha'],['ちゅ','チュ','chu'],['ちょ','乔','cho'],['にゃ','ニャ','nya'],['にゅ','ニュ','nyu'],['にょ','ニョ','nyo'],['ひゃ','ヒャ','hya'],['ひゅ','ヒュ','hyu'],['ひょ','ヒョ','hyo'],['みゃ','ミャ','mya'],['みゅ','ミュ','myu'],['みょ','ミョ','myo'],['りゃ','リャ','rya'],['りゅ','リュ','ryu'],['りょ','リョ','ryo']]
        };

        function init() {
            if(warehouse.length === 0) warehouse = [{ id: 501, category: '参考资料', title: '核心助词', textbook: 'は: 主题；が: 主语；を: 宾语；に: 时间地点。', points: [{k:"は",v:"提示谈话的主题。"},{k:"に",v:"表示动作发生的特定点。"}] }];
            document.getElementById('set-user-name').value = config.userName;
            document.getElementById('display-user-name').innerText = `Researcher: ${config.userName}`;
            document.getElementById('set-sync-id').value = config.syncId;
            document.getElementById('set-worker-url').value = config.workerUrl;
            document.getElementById('set-model').value = config.model;
            document.getElementById('set-key').value = config.key;
            document.getElementById('timestamp').innerText = new Date().toLocaleString('zh-CN', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            if(currentId) loadFromWarehouse(currentId);
            else goHome();
        }

        // --- 核心逻辑：空白界面与Home ---
        function goHome() {
            document.getElementById('source-title').innerText = "Home";
            document.getElementById('textbook-content').innerHTML = `<div class="h-full flex flex-col items-center justify-center text-zinc-300 italic text-[11px] text-center px-4">当前无课题内容。<br>点击 Library 进入资料馆，或点击 Generate 开始新课题。</div>`;
            document.getElementById('points-list').innerHTML = `<div class="h-full flex flex-col items-center justify-center text-[10px] text-zinc-300 italic text-center px-4">暂无解析。</div>`;
            document.getElementById('library-tabs').classList.add('hidden');
            document.getElementById('back-tag').classList.add('hidden');
        }

        function openLibrary() {
            document.getElementById('library-tabs').classList.remove('hidden');
            document.getElementById('back-tag').classList.remove('hidden');
            switchLib('kana');
        }

        function backToSource() {
            document.getElementById('library-tabs').classList.add('hidden');
            document.getElementById('back-tag').classList.add('hidden');
            if(currentId) loadFromWarehouse(currentId);
            else goHome();
        }

        function switchLib(tab) {
            document.querySelectorAll('.lib-nav-item').forEach(el => el.classList.toggle('active', el.innerText.includes(tab==='kana'?'五十音':(tab==='ref'?'参考':'文档'))));
            const content = document.getElementById('textbook-content');
            if(tab === 'kana') {
                document.getElementById('source-title').innerText = "LIBRARY / KANA";
                renderKana('seion');
            } else if(tab === 'ref') {
                document.getElementById('source-title').innerText = "LIBRARY / REFERENCE";
                content.innerHTML = warehouse.filter(i => i.category === '参考资料').map(r => `<div onclick="loadFromWarehouse(${r.id})" class="p-3 bg-zinc-50 rounded-xl mb-2 cursor-pointer hover:bg-zinc-100 font-bold text-[12px] uppercase text-left">${r.title}</div>`).join('');
            } else if(tab === 'docs') {
                document.getElementById('source-title').innerText = "LIBRARY / DOCUMENTS";
                content.innerHTML = warehouse.filter(i => i.category === '上传文档').map(d => `<div onclick="loadFromWarehouse(${d.id})" class="p-3 bg-zinc-50 rounded-xl mb-2 cursor-pointer hover:bg-zinc-100 font-bold text-[12px] uppercase truncate text-left">${d.title}</div>`).join('');
            }
        }

        function renderKana(key) {
            let html = `<div class="flex gap-2 mb-4"><span class="text-[9px] font-bold ${key==='seion'?'underline':''}" onclick="renderKana('seion')">清音</span><span class="text-[9px] font-bold ${key==='dakuon'?'underline':''}" onclick="renderKana('dakuon')">浊音</span><span class="text-[9px] font-bold ${key==='youon'?'underline':''}" onclick="renderKana('youon')">拗音</span></div><div class="kana-grid">`;
            KANA_DATA[key].forEach(k => {
                if(!k[0]) { html += `<div></div>`; return; }
                html += `<div class="kana-box" onclick="speak('${k[0]}')"><div class="text-[14px] font-bold">${k[0]}</div><div class="text-[8px] text-zinc-400 font-mono">${k[2]}</div></div>`;
            });
            document.getElementById('textbook-content').innerHTML = html + `</div>`;
        }

        function loadFromWarehouse(id) {
            const item = warehouse.find(i => i.id == id);
            if(!item) return;
            currentId = id;
            localStorage.setItem('ln_current_id', id);
            document.getElementById('library-tabs').classList.add('hidden');
            document.getElementById('back-tag').classList.add('hidden');
            document.getElementById('source-title').innerText = item.title;
            document.getElementById('textbook-content').innerText = item.textbook;
            document.getElementById('note-title').value = item.noteTitle || item.title;
            document.getElementById('note-editor').value = item.note || '';
            const pointsContainer = document.getElementById('points-list');
            if (item.points && item.points.length > 0) {
                pointsContainer.innerHTML = item.points.map(p => `
                    <div class="point-card text-left">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[15px] font-bold text-zinc-800">${p.k}</span>
                            <div class="flex gap-2">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="speak('${p.k}')" class="cursor-pointer text-zinc-300 hover:text-black"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                                <span onclick="addFragment('${p.k}', '${p.v}')" class="text-[16px] text-zinc-300 hover:text-black cursor-pointer font-bold">+</span>
                            </div>
                        </div>
                        <div class="text-[12px] text-zinc-500 leading-relaxed">${p.v}</div>
                    </div>
                `).join('');
            } else {
                pointsContainer.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-[10px] text-zinc-300 italic text-center px-4">当前课题无详细解析。</div>`;
            }
            renderFragments(item.fragments);
        }

        // --- 功能函数保持 ---
        async function pushToCloud() {
            if(!config.syncId || !config.workerUrl) return alert("配置不足");
            try { await fetch(config.workerUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ syncId: config.syncId, data: { warehouse, currentId } }) }); alert("同步成功"); } catch(e) { alert("同步失败"); }
        }
        async function pullFromCloud() {
            if(!config.syncId || !config.workerUrl) return;
            try { const res = await fetch(`${config.workerUrl}?syncId=${config.syncId}`); const r = await res.json(); if(r && r.warehouse) { warehouse = r.warehouse; currentId = r.currentId; localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); localStorage.setItem('ln_current_id', currentId); location.reload(); } } catch(e) {}
        }
        function exportMarkdown() {
            const item = warehouse.find(i => i.id == currentId);
            const md = `# ${document.getElementById('note-title').value}\n\n${document.getElementById('note-editor').value}\n\n## Fragments\n${(item?.fragments || []).map(f => `> **${f.t}**: ${f.c}`).join('\n\n')}`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([md], { type: 'text/markdown' })); a.download = `LogosNik_Note.md`; a.click();
        }
        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = /[\u3040-\u30ff]/.test(t) ? 'ja-JP' : 'zh-CN'; window.speechSynthesis.speak(u); }
        function speakContent() { speak(document.getElementById('textbook-content').innerText); }
        function saveCurrentNote() { const item = warehouse.find(i => i.id == currentId); if(item) { item.note = document.getElementById('note-editor').value; item.noteTitle = document.getElementById('note-title').value; localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); } }
        function openHistory() { document.getElementById('history-modal').classList.remove('hidden'); renderHistory(); }
        function closeHistory() { document.getElementById('history-modal').classList.add('hidden'); }
        function renderHistory() { document.getElementById('warehouse-list').innerHTML = warehouse.map(i => `<div onclick="loadFromWarehouse(${i.id});closeHistory()" class="p-3 bg-zinc-50 rounded-xl mb-2 cursor-pointer hover:bg-zinc-100 font-bold text-[11px] uppercase text-left">${i.title}</div>`).join(''); }
        function addFragment(t, c) { const item = warehouse.find(i => i.id == currentId); if(!item) return; if(!item.fragments) item.fragments = []; item.fragments.unshift({ id: Date.now(), t, c }); localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); renderFragments(item.fragments); }
        function renderFragments(frs) { document.getElementById('fragment-count').innerText = (frs || []).length; document.getElementById('fragment-container').innerHTML = (frs || []).map(f => `<div class="p-4 bg-white border border-zinc-100 rounded-2xl shadow-sm text-[9px] leading-relaxed relative group text-left font-bold tracking-tight"><div class="flex justify-between">${f.t} <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="deleteFragment(${f.id})" class="opacity-0 group-hover:opacity-100 text-red-200 hover:text-red-500 cursor-pointer"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>${f.c}</div>`).join(''); }
        function deleteFragment(id) { const item = warehouse.find(i => i.id == currentId); item.fragments = item.fragments.filter(f => f.id !== id); localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); renderFragments(item.fragments); }
        async function askNik() { const val = document.getElementById('chat-input').value; if(!val) return; appendChat(config.userName, val); document.getElementById('chat-input').value = ''; const res = await callAI(val); appendChat('Nik', res); }
        async function callAI(p) { const res = await fetch(config.host.endsWith('/') ? config.host + 'chat/completions' : config.host + '/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` }, body: JSON.stringify({ model: config.model, messages: [{ role: "user", content: p }], temperature: 0.7 }) }); const d = await res.json(); return d.choices[0].message.content; }
        function appendChat(r, m) { const h = document.getElementById('chat-history'); const d = document.createElement('div'); d.innerHTML = `<span class="font-bold opacity-30 uppercase tracking-tighter mr-2 text-[10px]">${r}</span> ${m}`; h.appendChild(d); h.scrollTop = h.scrollHeight; }
        async function generateLesson() { const topic = document.getElementById('topic-input').value; closeGenerateModal(); const res = await callAI(`生成「${topic}」的双语课文和5个详细讲解。JSON：{"textbook": "...", "points": [{"k":"词","v":"解"}]}`); try { const data = JSON.parse(res.match(/\{[\s\S]*\}/)[0]); const newItem = { id: Date.now(), category: '研究笔记', title: topic, textbook: data.textbook, points: data.points, note: '', fragments: [] }; warehouse.unshift(newItem); localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); loadFromWarehouse(newItem.id); } catch(e) {} }
        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveSettings() { config.userName = document.getElementById('set-user-name').value; config.syncId = document.getElementById('set-sync-id').value; config.workerUrl = document.getElementById('set-worker-url').value; config.model = document.getElementById('set-model').value; config.key = document.getElementById('set-key').value; localStorage.setItem('ln_v3_config', JSON.stringify(config)); document.getElementById('display-user-name').innerText = `Researcher: ${config.userName}`; closeSettings(); }
        function openGenerateModal() { document.getElementById('generate-modal').classList.remove('hidden'); }
        function closeGenerateModal() { document.getElementById('generate-modal').classList.add('hidden'); }
        window.onload = init;
    </script>
</body>
</html>
