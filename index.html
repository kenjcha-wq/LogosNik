<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LogosNik | 语言知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f3ef; font-family: 'Inter', 'Noto Sans SC', sans-serif; height: 100dvh; overflow: hidden; color: #2c2c2a; }
        
        /* 电脑端布局 */
        @media (min-width: 769px) {
            .mobile-only { display: none !important; }
            .desktop-layout { display: flex !important; flex-direction: column; height: 100vh; padding: 1rem; gap: 1rem; background: #f5f3ef; }
            .notebook-case { background: #fefcf8; border-radius: 20px; border: 1px solid #e8e2da; }
            .notebook-paper { background-image: linear-gradient(#f0ede7 1px, transparent 1px); background-size: 100% 2.2rem; }
            .point-card { background: #fff; border-radius: 14px; padding: 12px; margin-bottom: 10px; border: 1px solid #efe8e0; }
            .lib-nav-item { cursor: pointer; padding: 6px 14px; border-radius: 30px; font-size: 10px; font-weight: 600; background: #f0ede8; color: #8a8278; }
            .lib-nav-item.active { background: #2c2c2a; color: #fff; }
            .kana-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .kana-box { padding: 10px; text-align: center; background: #faf8f4; border-radius: 12px; cursor: pointer; border: 1px solid #e8e2d8; }
        }
        
        /* ========== 手机端 - 横屏左右分栏布局 ========== */
        @media (max-width: 768px) and (orientation: landscape) {
            .desktop-layout { display: none !important; }
            .mobile-layout {
                display: flex !important;
                flex-direction: row;
                height: 100dvh;
                width: 100%;
                background: #f5f3ef;
                overflow: hidden;
            }
            
            /* 左侧面板 40% */
            .left-panel {
                width: 40%;
                display: flex;
                flex-direction: column;
                border-right: 1px solid #e8e2da;
                background: #faf8f4;
                overflow: hidden;
            }
            
            /* 右侧面板 60% */
            .right-panel {
                width: 60%;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            
            /* 解析区域 */
            .analysis-area {
                flex: 7;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                padding: 12px;
            }
            .analysis-header {
                padding-bottom: 8px;
                border-bottom: 1px solid #e8e2da;
                display: flex;
                justify-content: space-between;
                margin-bottom: 10px;
            }
            .analysis-list {
                flex: 1;
                overflow-y: auto;
            }
            .analysis-item {
                background: white;
                border-radius: 12px;
                padding: 10px;
                margin-bottom: 8px;
                border: 1px solid #e8e2da;
            }
            
            /* 资料馆按钮 - 左侧底部 */
            .library-area {
                flex-shrink: 0;
                padding: 12px;
                border-top: 1px solid #e8e2da;
            }
            .library-btn {
                width: 100%;
                background: #e8e2da;
                border: none;
                border-radius: 40px;
                padding: 10px;
                text-align: center;
                font-weight: 600;
                font-size: 12px;
            }
            
            /* 学习内容区域 - 右侧上半 */
            .learning-area {
                flex: 6;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                padding: 12px;
            }
            .learning-content {
                flex: 1;
                overflow-y: auto;
                background: #fefcf8;
                border-radius: 20px;
                padding: 16px;
                border: 1px solid #e8e2da;
            }
            
            /* 对话框 - 右侧底部 */
            .chat-area {
                flex-shrink: 0;
                padding: 12px;
                border-top: 1px solid #e8e2da;
                background: #2c2c2a;
                border-radius: 20px 20px 0 0;
                margin: 0 12px 12px 12px;
            }
        }
        
        /* 竖屏手机 - 上下分栏，模仿左右逻辑 */
        @media (max-width: 768px) and (orientation: portrait) {
            .desktop-layout { display: none !important; }
            .mobile-layout {
                display: flex !important;
                flex-direction: column;
                height: 100dvh;
                width: 100%;
                background: #f5f3ef;
                overflow: hidden;
            }
            
            /* 头部 */
            .mobile-header {
                flex-shrink: 0;
                padding: 10px 16px;
                background: rgba(245, 243, 239, 0.96);
                border-bottom: 1px solid #e8e2da;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .logo { font-size: 1.1rem; font-weight: 700; font-family: 'Noto Serif SC', serif; }
            .sub { font-size: 7px; color: #a69f96; }
            .header-icons { display: flex; gap: 8px; }
            .header-icons button { background: none; border: none; padding: 6px; font-size: 14px; }
            
            /* 笔记按钮 */
            .note-trigger {
                position: fixed;
                left: 12px;
                top: 70px;
                background: white;
                border-radius: 30px;
                padding: 8px 12px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                z-index: 20;
                font-size: 12px;
                display: flex;
                align-items: center;
                gap: 4px;
                cursor: pointer;
            }
            
            /* 左右内容区域 - 上下排列 */
            .top-area {
                flex: 6;
                display: flex;
                flex-direction: row;
                padding: 12px;
                gap: 12px;
                min-height: 0;
            }
            /* 左侧解析区 (40%) */
            .left-analysis {
                width: 40%;
                display: flex;
                flex-direction: column;
                background: #faf8f4;
                border-radius: 20px;
                border: 1px solid #e8e2da;
                overflow: hidden;
            }
            .analysis-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 10px;
            }
            .analysis-item {
                background: white;
                border-radius: 12px;
                padding: 10px;
                margin-bottom: 8px;
                border: 1px solid #e8e2da;
            }
            /* 右侧学习区 (60%) */
            .right-learning {
                width: 60%;
                display: flex;
                flex-direction: column;
                background: #fefcf8;
                border-radius: 20px;
                border: 1px solid #e8e2da;
                overflow: hidden;
            }
            .learning-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 14px;
                font-size: 13px;
                line-height: 1.6;
            }
            
            /* 底部区域 */
            .bottom-area {
                flex: 4;
                display: flex;
                flex-direction: row;
                padding: 0 12px 12px 12px;
                gap: 12px;
                min-height: 0;
            }
            /* 左侧资料馆按钮区 */
            .left-library {
                width: 40%;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
            }
            .library-btn-big {
                background: #e8e2da;
                border: none;
                border-radius: 40px;
                padding: 12px;
                font-weight: 600;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                cursor: pointer;
            }
            /* 右侧对话框区 */
            .right-chat {
                width: 60%;
                background: #2c2c2a;
                border-radius: 24px;
                padding: 10px;
                display: flex;
                flex-direction: column;
            }
            .chat-messages {
                flex: 1;
                overflow-y: auto;
                font-size: 10px;
                color: #e0dcd6;
                max-height: 100px;
            }
            .chat-input-row {
                display: flex;
                gap: 6px;
                margin-top: 8px;
            }
            .chat-input-row input {
                flex: 1;
                background: rgba(255,255,255,0.12);
                border: none;
                border-radius: 30px;
                padding: 8px 12px;
                font-size: 11px;
                color: white;
            }
            .chat-input-row button {
                background: rgba(255,255,255,0.18);
                border: none;
                border-radius: 30px;
                padding: 8px 14px;
                font-size: 11px;
                color: white;
            }
            
            /* 笔记侧栏 - 左侧滑出 */
            .note-drawer {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 300px;
                background: #fefcf8;
                z-index: 100;
                display: flex;
                flex-direction: column;
                box-shadow: 4px 0 28px rgba(0,0,0,0.2);
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                border-radius: 0 28px 28px 0;
            }
            .note-drawer.open { transform: translateX(0); }
            .drawer-header {
                padding: 18px;
                border-bottom: 1px solid #e8e2da;
                display: flex;
                justify-content: space-between;
                background: #faf8f4;
            }
            .drawer-content {
                flex: 1;
                overflow-y: auto;
                padding: 16px;
            }
            .note-title {
                width: 100%;
                font-size: 18px;
                font-weight: 600;
                border: none;
                border-bottom: 1px solid #e8e2da;
                margin-bottom: 16px;
                padding-bottom: 8px;
                background: transparent;
            }
            .note-body {
                width: 100%;
                min-height: 200px;
                border: none;
                font-size: 13px;
                line-height: 1.5;
                resize: none;
                background: transparent;
            }
            .fragments {
                padding: 12px;
                border-top: 1px solid #e8e2da;
                background: #faf8f4;
                max-height: 120px;
                overflow-y: auto;
            }
            .drawer-mask {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.3);
                z-index: 99;
                display: none;
            }
            .drawer-mask.show { display: block; }
        }
    </style>
</head>
<body>

<!-- ==================== 电脑端布局（完整保留） ==================== -->
<div id="desktopLayout" class="desktop-layout">
    <header class="h-12 flex justify-between items-center px-2">
        <div class="flex items-center gap-4 text-left">
            <div class="flex flex-col leading-tight cursor-pointer" onclick="goHome()">
                <span class="text-xl font-bold tracking-[0.2em] font-serif uppercase text-zinc-800 flex items-center gap-2">LogosNik <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
                <span class="text-[14px] font-bold text-zinc-500 tracking-wider">语言知识库</span>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex bg-zinc-100 rounded-full p-1">
                <button onclick="pushToCloud()" class="p-1.5 hover:bg-white rounded-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
                <button onclick="pullFromCloud()" class="p-1.5 hover:bg-white rounded-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
            </div>
            <label class="cursor-pointer text-[10px] px-4 py-2 bg-zinc-200/50 hover:bg-zinc-200 rounded-full font-bold uppercase">上传<input type="file" class="hidden" onchange="handleFileUpload(event)"></label>
            <button onclick="exportMarkdown()" class="text-[10px] px-4 py-2 bg-green-50 text-green-700 rounded-full font-bold uppercase">导出MD</button>
            <button onclick="exportToNutstore()" class="text-[10px] px-4 py-2 bg-amber-50 text-amber-700 rounded-full font-bold uppercase">坚果云导出</button>
            <label class="cursor-pointer text-[10px] px-4 py-2 bg-amber-50 text-amber-700 rounded-full font-bold uppercase">坚果云导入<input type="file" class="hidden" onchange="importFromNutstore(event)"></label>
            <button onclick="openGenerateModal()" class="text-[10px] px-4 py-2 bg-zinc-800 text-white rounded-full font-bold shadow-md uppercase">生成</button>
            <button onclick="openSettings()" class="p-2 text-zinc-400 hover:text-black"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        </div>
    </header>

    <div class="flex-1 flex gap-5 overflow-hidden">
        <aside class="w-64 flex flex-col gap-4 overflow-hidden">
            <div class="flex-1 bg-white/40 backdrop-blur rounded-2xl p-4 border border-white/60 flex flex-col overflow-hidden shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-bold text-zinc-400 uppercase">解析 / Analysis</h3>
                    <button onclick="openHistory()" class="text-[10px] font-bold text-zinc-300 hover:text-black uppercase">仓库</button>
                </div>
                <div id="points-list" class="flex-1 overflow-y-auto no-scrollbar"></div>
            </div>
            <button onclick="openLibrary()" class="h-16 bg-zinc-800 text-white rounded-2xl p-4 flex items-center justify-center gap-3 hover:bg-black transition-all shadow-lg text-[11px] font-bold uppercase">Library</button>
        </aside>

        <main class="flex-1 notebook-case flex overflow-hidden relative">
            <div class="flex-1 flex flex-col overflow-hidden border-r border-zinc-50">
                <div class="h-12"></div>
                <div class="flex-1 overflow-y-auto notebook-paper px-12 py-8 no-scrollbar relative">
                    <div class="flex justify-between items-center mb-2">
                        <div id="timestamp" class="text-[9px] text-zinc-300 font-mono"></div>
                        <div id="display-user-name" class="text-[9px] text-zinc-400 font-bold uppercase">Researcher</div>
                    </div>
                    <input type="text" id="note-title" placeholder="Note Title" class="w-full text-2xl font-bold bg-transparent border-none outline-none mb-4 font-serif">
                    <textarea id="note-editor" oninput="saveCurrentNote()" class="w-full h-full bg-transparent border-none outline-none text-zinc-700 resize-none" placeholder="开始记录思考..."></textarea>
                </div>
            </div>
            <div class="margin-notes flex flex-col overflow-hidden bg-[#fafafa]/30 p-4" style="width:200px;">
                <div id="fragment-container" class="flex-1 overflow-y-auto space-y-3 no-scrollbar text-[10px]"></div>
            </div>
        </main>

        <aside class="w-80 flex flex-col gap-4 overflow-hidden">
            <div class="flex-1 bg-white rounded-2xl p-6 shadow-sm border border-zinc-100 flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-zinc-50">
                    <div class="flex items-center gap-2">
                        <h3 id="source-title" class="text-[10px] font-bold text-zinc-400 uppercase">资料库</h3>
                        <button id="back-tag" onclick="backToSource()" class="hidden bg-zinc-800 text-white px-2 py-0.5 rounded text-[9px] font-bold">返回</button>
                    </div>
                    <button onclick="speakContent()" class="text-zinc-300"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
                </div>
                <div id="library-tabs" class="hidden mb-6 flex gap-2 flex-wrap">
                    <span class="lib-nav-item active" onclick="switchLib('kana')">五十音</span>
                    <span class="lib-nav-item" onclick="switchLib('ref')">参考库</span>
                    <span class="lib-nav-item" onclick="switchLib('docs')">上传文档</span>
                </div>
                <div id="textbook-content" class="flex-1 overflow-y-auto text-[14px] leading-relaxed text-zinc-600 no-scrollbar font-serif"></div>
            </div>
            <div class="h-64 bg-zinc-900 rounded-3xl p-5 text-white flex flex-col shadow-xl">
                <div id="chat-history" class="flex-1 overflow-y-auto text-[11px] space-y-2 mb-3 no-scrollbar leading-relaxed"></div>
                <div class="relative"><input id="chat-input" type="text" onkeypress="if(event.key==='Enter') askNik()" class="w-full bg-white/10 rounded-2xl p-3 text-[11px] outline-none" placeholder="Ask Nik..."></div>
            </div>
        </aside>
    </div>
</div>

<!-- ==================== 手机端 - 竖屏左右分区布局 ==================== -->
<div id="mobileLayout" class="mobile-layout" style="display: none;">
    <!-- 头部 -->
    <div class="mobile-header">
        <div class="logo-area" onclick="goHomeMobile()">
            <div class="logo">LogosNik</div>
            <div class="sub">语言知识库</div>
        </div>
        <div class="header-icons">
            <button onclick="pushToCloud()">☁️</button>
            <button onclick="pullFromCloud()">⬇️</button>
            <button onclick="exportToNutstore()">📤</button>
            <label style="cursor:pointer;">📥<input type="file" class="hidden" onchange="importFromNutstore(event)"></label>
            <button onclick="openSettings()">⚙️</button>
        </div>
    </div>

    <!-- 笔记触发器 -->
    <div class="note-trigger" onclick="openNoteDrawer()">
        📝 笔记
    </div>

    <!-- 遮罩 + 笔记侧栏 -->
    <div id="drawerMask" class="drawer-mask" onclick="closeNoteDrawer()"></div>
    <div id="noteDrawer" class="note-drawer">
        <div class="drawer-header">
            <h3>📝 我的笔记</h3>
            <button onclick="closeNoteDrawer()">✕</button>
        </div>
        <div class="drawer-content">
            <input type="text" id="mobileNoteTitle" class="note-title" placeholder="标题">
            <textarea id="mobileNoteEditor" class="note-body" placeholder="记录思考..." oninput="saveCurrentNoteMobile()"></textarea>
        </div>
        <div class="fragments">
            <div style="font-size: 9px; color: #8a8278; margin-bottom: 6px;">📌 知识碎片（点击导入）</div>
            <div id="mobileFragmentContainer"></div>
        </div>
    </div>

    <!-- 上半部分：解析(40%) + 学习内容(60%) -->
    <div class="top-area">
        <!-- 左侧解析区 -->
        <div class="left-analysis">
            <div style="padding: 10px; border-bottom: 1px solid #e8e2da; display: flex; justify-content: space-between;">
                <span style="font-weight: 600; font-size: 11px;">🔍 解析 / 要点</span>
                <button onclick="openHistoryMobile()" style="background: none; border: none; font-size: 10px; color: #8a8278;">仓库 →</button>
            </div>
            <div id="mobilePointsList" class="analysis-scroll"></div>
        </div>
        <!-- 右侧学习区 -->
        <div class="right-learning">
            <div style="padding: 10px; border-bottom: 1px solid #e8e2da; display: flex; justify-content: space-between;">
                <span style="font-weight: 600; font-size: 11px;">📖 学习内容</span>
                <button onclick="speakContentMobile()" style="background: none; border: none;">🔊</button>
            </div>
            <div id="mobileTextbookContent" class="learning-scroll">加载中...</div>
        </div>
    </div>

    <!-- 下半部分：资料馆按钮(40%) + 对话框(60%) -->
    <div class="bottom-area">
        <div class="left-library">
            <button class="library-btn-big" onclick="openLibraryMobile()">
                📚 资料馆
                <span style="font-size: 9px;">五十音 / 参考库 / 文档</span>
            </button>
        </div>
        <div class="right-chat">
            <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                <span style="font-size: 9px; color: #a8a098;">🤖 Nik AI · 对答学习</span>
                <button onclick="clearChatMobile()" style="background: rgba(255,255,255,0.1); border: none; padding: 2px 8px; border-radius: 20px; font-size: 8px; color: #ccc;">清空</button>
            </div>
            <div id="mobileChatHistory" class="chat-messages"></div>
            <div class="chat-input-row">
                <input id="mobileChatInput" type="text" onkeypress="if(event.key==='Enter') askNikMobile()" placeholder="输入问题...">
                <button onclick="askNikMobile()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== 全局数据 ==========
    let config = JSON.parse(localStorage.getItem('ln_v3_config')) || { userName: 'Researcher', host: 'https://api.deepseek.com/v1', model: 'deepseek-chat', key: '', syncId: '', workerUrl: '' };
    let warehouse = JSON.parse(localStorage.getItem('ln_warehouse')) || [];
    let currentId = localStorage.getItem('ln_current_id') || null;

    const KANA_DATA = {
        seion: [['あ','ア','a'],['い','イ','i'],['う','ウ','u'],['え','エ','e'],['お','オ','o'],['か','カ','ka'],['き','キ','ki'],['く','ク','ku'],['け','ケ','ke'],['こ','コ','ko'],['さ','サ','sa'],['し','シ','shi'],['す','ス','su'],['せ','セ','se'],['そ','ソ','so'],['た','タ','ta'],['ち','チ','chi'],['つ','ツ','tsu'],['て','テ','te'],['と','ト','to'],['な','纳','na'],['に','尼','ni'],['ぬ','努','nu'],['ね','内','ne'],['の','诺','no'],['は','哈','ha'],['ひ','西','hi'],['ふ','夫','fu'],['へ','嘿','he'],['ほ','霍','ho'],['ま','马','ma'],['み','米','mi'],['む','木','mu'],['め','咩','me'],['も','莫','mo'],['や','雅','ya'],['','',''],['ゆ','由','yu'],['','',''],['よ','哟','yo'],['ら','拉','ra'],['り','利','ri'],['る','鲁','ru'],['れ','雷','re'],['ろ','罗','ro'],['わ','哇','wa'],['','',''],['','',''],['','',''],['を','喔','wo'],['ん','嗯','n']],
        dakuon: [['が','加','ga'],['ぎ','义','gi'],['ぐ','古','gu'],['げ','格','ge'],['ご','共','go'],['ざ','杂','za'],['じ','字','ji'],['ず','租','zu'],['ぜ','则','ze'],['ぞ','左','zo'],['だ','打','da'],['ぢ','集','ji'],['づ','族','zu'],['德','德','de'],['ど','多','do'],['ば','八','ba'],['び','比','bi'],['ぶ','布','bu'],['べ','倍','be'],['ぼ','波','bo'],['ぱ','帕','pa'],['ぴ','皮','pi'],['ぷ','普','pu'],['ぺ','培','pe'],['ぽ','坡','po']],
        youon: [['きゃ','キャ','kya'],['きゅ','キュ','kyu'],['きょ','乔','kyo'],['しゃ','シャ','sha'],['しゅ','シュ','shu'],['しょ','ショ','sho'],['ちゃ','チャ','cha'],['ちゅ','チュ','chu'],['ちょ','乔','cho'],['にゃ','ニャ','nya'],['にゅ','ニュ','nyu'],['にょ','尼ょ','nyo'],['ひゃ','ヒャ','hya'],['ひゅ','ヒュ','hyu'],['ひょ','ヒョ','hyo'],['みゃ','ミャ','mya'],['みゅ','ミュ','myu'],['みょ','ミョ','myo'],['りゃ','リャ','rya'],['りゅ','リュ','ryu'],['りょ','リョ','ryo']]
    };

    function init() {
        if(warehouse.length === 0) loadRefs();
        document.getElementById('set-user-name').value = config.userName;
        document.getElementById('set-host').value = config.host || '';
        document.getElementById('set-model').value = config.model || '';
        document.getElementById('set-key').value = config.key || '';
        document.getElementById('set-sync-id').value = config.syncId || '';
        document.getElementById('set-worker-url').value = config.workerUrl || '';
        const ts = new Date().toLocaleString('zh-CN', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        if(document.getElementById('timestamp')) document.getElementById('timestamp').innerText = ts;
        if(document.getElementById('display-user-name')) document.getElementById('display-user-name').innerText = config.userName;
        if(currentId) loadFromWarehouse(currentId);
        else goHome();
        checkScreenSize();
        window.addEventListener('resize', checkScreenSize);
    }

    function checkScreenSize() {
        const isMobile = window.innerWidth <= 768;
        const desktop = document.getElementById('desktopLayout');
        const mobile = document.getElementById('mobileLayout');
        if(desktop) desktop.style.display = isMobile ? 'none' : 'flex';
        if(mobile) mobile.style.display = isMobile ? 'flex' : 'none';
        if(isMobile && currentId) syncMobileFromCurrent();
    }

    function syncMobileFromCurrent() {
        const item = warehouse.find(i => i.id == currentId);
        if(!item) return;
        if(document.getElementById('mobileNoteTitle')) document.getElementById('mobileNoteTitle').value = item.noteTitle || item.title;
        if(document.getElementById('mobileNoteEditor')) document.getElementById('mobileNoteEditor').value = item.note || '';
        if(document.getElementById('mobileTextbookContent')) document.getElementById('mobileTextbookContent').innerHTML = item.textbook || '<div style="color:#a69f96;">无内容</div>';
        
        const ptsDiv = document.getElementById('mobilePointsList');
        if(ptsDiv && item.points) {
            if(item.points.length) ptsDiv.innerHTML = item.points.map(p => `<div class="analysis-item"><div style="font-weight:600; margin-bottom:4px;">${escapeHtml(p.k)}</div><div style="font-size:11px; color:#8a8278;">${escapeHtml(p.v)}</div></div>`).join('');
            else ptsDiv.innerHTML = '<div style="padding:16px; text-align:center; color:#a69f96;">暂无解析</div>';
        }
        const fragDiv = document.getElementById('mobileFragmentContainer');
        if(fragDiv && item.fragments) {
            fragDiv.innerHTML = (item.fragments || []).map(f => `<div class="frag-item" style="background:white; border-radius:10px; padding:8px; margin-bottom:6px; cursor:pointer;" onclick="insertToChat('${escapeHtml(f.t)}: ${escapeHtml(f.c.substring(0,80))}')"><strong>${escapeHtml(f.t)}</strong><br><span style="font-size:9px; color:#8a8278;">${escapeHtml(f.c.substring(0,60))}${f.c.length>60?'…':''}</span></div>`).join('');
        }
    }
    
    function insertToChat(text) {
        const input = document.getElementById('mobileChatInput');
        if(input) input.value = text;
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function saveCurrentNoteMobile() {
        const item = warehouse.find(i => i.id == currentId);
        if(item && document.getElementById('mobileNoteEditor')) {
            item.note = document.getElementById('mobileNoteEditor').value;
            item.noteTitle = document.getElementById('mobileNoteTitle').value;
            localStorage.setItem('ln_warehouse', JSON.stringify(warehouse));
        }
    }

    function openNoteDrawer() { document.getElementById('noteDrawer').classList.add('open'); document.getElementById('drawerMask').classList.add('show'); }
    function closeNoteDrawer() { document.getElementById('noteDrawer').classList.remove('open'); document.getElementById('drawerMask').classList.remove('show'); }

    function openLibraryMobile() {
        showLibraryPanel();
    }
    
    function showLibraryPanel() {
        const contentDiv = document.getElementById('mobileTextbookContent');
        const original = contentDiv.innerHTML;
        contentDiv.innerHTML = `
            <div>
                <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
                    <button onclick="switchLibMobile('kana')" style="background:#e8e2da; border:none; padding:5px 10px; border-radius:20px; font-size:10px;">五十音</button>
                    <button onclick="switchLibMobile('ref')" style="background:#e8e2da; border:none; padding:5px 10px; border-radius:20px; font-size:10px;">参考库</button>
                    <button onclick="switchLibMobile('docs')" style="background:#e8e2da; border:none; padding:5px 10px; border-radius:20px; font-size:10px;">文档</button>
                    <button onclick="restoreContent()" style="background:#2c2c2a; color:white; border:none; padding:5px 10px; border-radius:20px; font-size:10px;">返回</button>
                </div>
                <div id="libTempContent"></div>
            </div>
        `;
        window._savedContent = original;
        switchLibMobile('kana');
    }
    
    function restoreContent() { 
        const div = document.getElementById('mobileTextbookContent');
        if(div && window._savedContent) div.innerHTML = window._savedContent;
    }
    
    function switchLibMobile(tab) {
        const tempDiv = document.getElementById('libTempContent');
        if(!tempDiv) return;
        if(tab === 'kana') {
            let html = '<div class="grid grid-cols-5 gap-1">';
            KANA_DATA.seion.forEach(k => {
                if(k[0]) html += `<div style="padding:8px; text-align:center; background:#faf8f4; border-radius:10px;" onclick="speak('${k[0]}')"><div>${k[0]}</div><div style="font-size:8px;">${k[2]}</div></div>`;
            });
            tempDiv.innerHTML = html + '</div>';
        } else if(tab === 'ref') {
            tempDiv.innerHTML = warehouse.filter(i => i.category === '参考资料').map(r => `<div onclick="loadFromWarehouseMobile(${r.id})" style="padding:10px; background:#faf8f4; border-radius:12px; margin-bottom:6px; cursor:pointer;">${escapeHtml(r.title)}</div>`).join('') || '<div>暂无</div>';
        } else if(tab === 'docs') {
            tempDiv.innerHTML = warehouse.filter(i => i.category === '上传文档').map(d => `<div onclick="loadFromWarehouseMobile(${d.id})" style="padding:10px; background:#faf8f4; border-radius:12px; margin-bottom:6px; cursor:pointer;">${escapeHtml(d.title)}</div>`).join('') || '<div>暂无</div>';
        }
    }
    
    function loadFromWarehouseMobile(id) {
        const item = warehouse.find(i => i.id == id);
        if(!item) return;
        currentId = id;
        localStorage.setItem('ln_current_id', id);
        syncMobileFromCurrent();
        restoreContent();
        closeNoteDrawer();
    }
    
    async function askNikMobile() {
        const input = document.getElementById('mobileChatInput');
        const val = input.value;
        if(!val) return;
        appendChatMobile(config.userName, val);
        input.value = '';
        const res = await callAI(val);
        appendChatMobile('Nik', res);
    }
    function appendChatMobile(r, m) {
        const h = document.getElementById('mobileChatHistory');
        if(h) {
            const d = document.createElement('div');
            d.innerHTML = `<span style="color:#b0a89e;">${escapeHtml(r)}:</span> <span style="color:#e0dcd6;">${escapeHtml(m)}</span>`;
            h.appendChild(d);
            h.scrollTop = h.scrollHeight;
        }
    }
    function clearChatMobile() { const h = document.getElementById('mobileChatHistory'); if(h) h.innerHTML = '<div style="color:#7a7268;">对话已清空</div>'; }
    
    async function callAI(p) {
        if(!config.host || !config.key) return "请先在设置中配置 API";
        try {
            const res = await fetch(config.host.endsWith('/') ? config.host + 'chat/completions' : config.host + '/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
                body: JSON.stringify({ model: config.model || 'deepseek-chat', messages: [{ role: "user", content: p }] })
            });
            const d = await res.json();
            return d.choices?.[0]?.message?.content || "无回复";
        } catch(e) { return "请求失败"; }
    }
    
    function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = /[\u3040-\u30ff]/.test(t) ? 'ja-JP' : 'zh-CN'; window.speechSynthesis.speak(u); }
    function speakContentMobile() { const content = document.getElementById('mobileTextbookContent').innerText; speak(content); }
    function goHomeMobile() { goHome(); syncMobileFromCurrent(); }
    
    function exportToNutstore() {
        const data = JSON.stringify({ warehouse, config, currentId });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' }));
        a.download = `LogosNik_${Date.now()}.json`;
        a.click();
        alert("导出成功");
    }
    function importFromNutstore(event) {
        const file = event.target.files[0];
        if(!file) return;
        const r = new FileReader();
        r.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(data.warehouse) localStorage.setItem('ln_warehouse', JSON.stringify(data.warehouse));
                if(data.currentId) localStorage.setItem('ln_current_id', data.currentId);
                if(data.config) localStorage.setItem('ln_v3_config', JSON.stringify(data.config));
                alert("导入成功，刷新");
                location.reload();
            } catch(err) { alert("解析失败"); }
        };
        r.readAsText(file);
    }
    
    // 电脑端函数
    function goHome() { if(document.getElementById('source-title')) document.getElementById('source-title').innerText = "Home"; if(document.getElementById('textbook-content')) document.getElementById('textbook-content').innerHTML = '<div>空白</div>'; if(document.getElementById('points-list')) document.getElementById('points-list').innerHTML = '<div>暂无</div>'; if(document.getElementById('library-tabs')) document.getElementById('library-tabs').classList.add('hidden'); if(document.getElementById('back-tag')) document.getElementById('back-tag').classList.add('hidden'); }
    function openLibrary() { if(document.getElementById('library-tabs')) document.getElementById('library-tabs').classList.remove('hidden'); if(document.getElementById('back-tag')) document.getElementById('back-tag').classList.remove('hidden'); switchLib('kana'); }
    function backToSource() { if(document.getElementById('library-tabs')) document.getElementById('library-tabs').classList.add('hidden'); if(document.getElementById('back-tag')) document.getElementById('back-tag').classList.add('hidden'); if(currentId) loadFromWarehouse(currentId); else goHome(); }
    function switchLib(tab) { const content = document.getElementById('textbook-content'); if(tab === 'kana') renderKana('seion'); else if(tab === 'ref') content.innerHTML = warehouse.filter(i => i.category === '参考资料').map(r => `<div onclick="loadFromWarehouse(${r.id})" class="p-2 bg-zinc-50 rounded mb-1">${escapeHtml(r.title)}</div>`).join('') || "空"; else if(tab === 'docs') content.innerHTML = warehouse.filter(i => i.category === '上传文档').map(d => `<div onclick="loadFromWarehouse(${d.id})" class="p-2 bg-zinc-50 rounded mb-1">${escapeHtml(d.title)}</div>`).join('') || "空"; }
    function renderKana(key) { let html = '<div class="kana-grid">'; KANA_DATA[key].forEach(k => { if(!k[0]) { html += `<div></div>`; return; } html += `<div class="kana-box" onclick="speak('${k[0]}')"><div>${k[0]}</div><div class="text-[8px]">${k[2]}</div></div>`; }); document.getElementById('textbook-content').innerHTML = html + '</div>'; }
    function loadFromWarehouse(id) { const item = warehouse.find(i => i.id == id); if(!item) return; currentId = id; localStorage.setItem('ln_current_id', id); if(document.getElementById('library-tabs')) document.getElementById('library-tabs').classList.add('hidden'); if(document.getElementById('back-tag')) document.getElementById('back-tag').classList.add('hidden'); if(document.getElementById('source-title')) document.getElementById('source-title').innerText = item.title; if(document.getElementById('textbook-content')) document.getElementById('textbook-content').innerHTML = item.textbook; if(document.getElementById('note-title')) document.getElementById('note-title').value = item.noteTitle || item.title; if(document.getElementById('note-editor')) document.getElementById('note-editor').value = item.note || ''; const pts = document.getElementById('points-list'); if(pts && item.points) pts.innerHTML = item.points.map(p => `<div class="point-card"><div class="font-bold">${escapeHtml(p.k)}</div><div>${escapeHtml(p.v)}</div></div>`).join('') || '无'; renderFragments(item.fragments); syncMobileFromCurrent(); }
    function renderFragments(frs) { const container = document.getElementById('fragment-container'); if(container) container.innerHTML = (frs || []).map(f => `<div class="p-2 bg-white border rounded text-[10px]"><strong>${escapeHtml(f.t)}</strong><br>${escapeHtml(f.c)}</div>`).join(''); }
    function saveCurrentNote() { const item = warehouse.find(i => i.id == currentId); if(item && document.getElementById('note-editor')) { item.note = document.getElementById('note-editor').value; item.noteTitle = document.getElementById('note-title').value; localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); } }
    async function askNik() { const input = document.getElementById('chat-input'); if(!input) return; const val = input.value; if(!val) return; appendChat(config.userName, val); input.value = ''; const res = await callAI(val); appendChat('Nik', res); }
    function appendChat(r, m) { const h = document.getElementById('chat-history'); if(h) { const d = document.createElement('div'); d.innerHTML = `<span class="font-bold">${escapeHtml(r)}:</span> ${escapeHtml(m)}`; h.appendChild(d); h.scrollTop = h.scrollHeight; } }
    function generateLesson() { const topic = document.getElementById('topic-input').value; closeGenerateModal(); callAI(`生成「${topic}」的双语课文和5个解析。JSON格式`).then(res => { try { const match = res.match(/\{[\s\S]*\}/); if(match) { const data = JSON.parse(match[0]); const newItem = { id: Date.now(), category: '研究笔记', title: topic, textbook: data.textbook, points: data.points, note: '', fragments: [] }; warehouse.unshift(newItem); localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); loadFromWarehouse(newItem.id); } } catch(e) {} }); }
    function loadRefs() { if(warehouse.length === 0) warehouse = [{ id: 801, category: '参考资料', title: '核心助词', textbook: 'は: 主题；が: 主语；を: 宾语；に: 时间地点。', points: [{k:"は",v:"提示谈话的主题。"},{k:"に",v:"表示动作发生的特定点。"}] }]; localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); }
    function handleFileUpload(event) { const file = event.target.files[0]; if(!file) return; const r = new FileReader(); r.onload = function(e) { const newItem = { id: Date.now(), category: '上传文档', title: file.name, textbook: e.target.result, points: [], note: '', fragments: [] }; warehouse.unshift(newItem); localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); loadFromWarehouse(newItem.id); }; r.readAsText(file); }
    function exportMarkdown() { const item = warehouse.find(i => i.id == currentId); if(!item) return; const md = `# ${item.noteTitle || item.title}\n\n${item.note || ''}`; const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([md], { type: 'text/markdown' })); a.download = `LogosNik_Note.md`; a.click(); }
    async function pushToCloud() { if(!config.syncId || !config.workerUrl) return alert("配置不足"); try { await fetch(config.workerUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ syncId: config.syncId, data: { warehouse, currentId } }) }); alert("同步成功"); } catch(e) { alert("失败"); } }
    async function pullFromCloud() { if(!config.syncId || !config.workerUrl) return; try { const res = await fetch(`${config.workerUrl}?syncId=${config.syncId}`); const r = await res.json(); if(r && r.warehouse) { warehouse = r.warehouse; currentId = r.currentId; localStorage.setItem('ln_warehouse', JSON.stringify(warehouse)); localStorage.setItem('ln_current_id', currentId); location.reload(); } } catch(e) {} }
    function saveSettings() { config.userName = document.getElementById('set-user-name').value; config.host = document.getElementById('set-host').value; config.model = document.getElementById('set-model').value; config.key = document.getElementById('set-key').value; config.syncId = document.getElementById('set-sync-id').value; config.workerUrl = document.getElementById('set-worker-url').value; localStorage.setItem('ln_v3_config', JSON.stringify(config)); alert("配置已保存"); closeSettings(); }
    function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
    function openGenerateModal() { document.getElementById('generate-modal').classList.remove('hidden'); }
    function closeGenerateModal() { document.getElementById('generate-modal').classList.add('hidden'); }
    function openHistory() { document.getElementById('history-modal').classList.remove('hidden'); renderHistory(); }
    function openHistoryMobile() { openHistory(); }
    function closeHistory() { document.getElementById('history-modal').classList.add('hidden'); }
    function renderHistory() { const list = document.getElementById('warehouse-list'); if(list) list.innerHTML = warehouse.map(i => `<div onclick="loadFromWarehouse(${i.id});closeHistory()" class="p-3 bg-zinc-50 rounded-xl mb-2">${escapeHtml(i.title)}</div>`).join(''); }
    
    window.onload = init;
</script>

<!-- 模态框 -->
<div id="settings-modal" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeSettings()"><div class="bg-white rounded-2xl max-w-md w-full p-6 m-4"><h3 class="font-bold mb-4">配置</h3><div class="space-y-3"><input id="set-host" class="w-full p-3 border rounded" placeholder="API地址"><input id="set-model" class="w-full p-3 border rounded" placeholder="模型"><input id="set-key" class="w-full p-3 border rounded" placeholder="API Key"><input id="set-user-name" class="w-full p-3 border rounded" placeholder="用户名"><input id="set-sync-id" class="w-full p-3 border rounded" placeholder="同步ID"><input id="set-worker-url" class="w-full p-3 border rounded" placeholder="Worker URL"><button onclick="saveSettings()" class="w-full py-3 bg-black text-white rounded">保存</button></div></div></div>
<div id="history-modal" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeHistory()"><div class="bg-white rounded-2xl max-w-sm w-full p-6 m-4"><h3 class="font-bold mb-4">仓库</h3><div id="warehouse-list" class="max-h-96 overflow-y-auto"></div></div></div>
<div id="generate-modal" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeGenerateModal()"><div class="bg-white rounded-2xl max-w-sm w-full p-6 m-4"><input id="topic-input" class="w-full p-3 border rounded mb-4" placeholder="课题"><button onclick="generateLesson()" class="w-full py-3 bg-black text-white rounded">生成</button></div></div>
</body>
</html>
