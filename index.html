<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LogosNik | 文学实验室 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f4f0; font-family: 'Noto Sans SC', sans-serif; height: 100dvh; overflow: hidden; color: #333; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .notebook-case { background-color: #fdfdfb; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border-radius: 8px; border: 1px solid #e5e5e0; }
        .notebook-paper { background-image: linear-gradient(#f1f1f1 1px, transparent 1px); background-size: 100% 2.5rem; line-height: 2.5rem; }
        .point-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 12px; margin-bottom: 12px; transition: all 0.2s; cursor: pointer; text-align: left; position: relative; }
        .point-card:hover { border-color: #000; transform: translateY(-2px); }
        .fragment-pill { background: #f0f0eb; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #666; border: 1px solid #e0e0d5; white-space: nowrap; cursor: pointer; }
        
        #desktop-source-drawer {
            position: fixed; right: 0; top: 0; bottom: 0; width: 350px;
            background: rgba(255,255,255,0.98); backdrop-filter: blur(15px);
            z-index: 150; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -15px 0 35px rgba(0,0,0,0.05); border-left: 1px solid #eee;
        }
        #desktop-source-drawer.active { transform: translateX(0); }

        .mobile-btn-float {
            position: fixed; z-index: 200; width: 44px; height: 44px;
            background: #000; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 16px; transition: transform 0.2s;
        }
        .btn-chat { bottom: 30px; right: 20px; background: #000; }
        .btn-lib { bottom: 30px; right: 75px; background: #555; }
        .btn-analysis { bottom: 30px; left: 20px; background: #555; }

        @media (max-width: 768px) {
            .desktop-layout { display: none !important; }
            .mobile-layout { display: flex !important; flex-direction: column; height: 100dvh; width: 100%; background: #f4f4f0; overflow: hidden; }
            .mobile-side-panel { position: absolute; top: 0; bottom: 0; z-index: 300; width: 85%; background: #fdfdfb; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 40px rgba(0,0,0,0.1); }
            #mobileLeftPanel { left: 0; transform: translateX(-100%); }
            #mobileLeftPanel.active { transform: translateX(0); }
            #mobileRightPanel { right: 0; transform: translateX(100%); }
            #mobileRightPanel.active { transform: translateX(0); }
            .mobile-notebook { flex: 1; padding: 4px 8px; overflow-y: auto; }
            .mobile-editor-paper { background-image: linear-gradient(#f1f1f1 1px, transparent 1px); background-size: 100% 2.1rem; line-height: 2.1rem; font-size: 16px; min-height: 100%; }
            .mobile-header { padding: 0 12px; height: 38px; border-bottom: 1px solid #eee; background: #f4f4f0; }
            #mobile-chat-modal { position: fixed; inset: 0; z-index: 500; background: #0a0a0a; display: none; flex-direction: column; }
            #mobile-chat-modal.active { display: flex; }
            #mobileChatHistory { flex: 1; overflow-y: auto !important; -webkit-overflow-scrolling: touch; }
        }
        
        @media (min-width: 769px) {
            .mobile-layout { display: none !important; }
            .desktop-layout { display: flex !important; flex-direction: column; height: 100vh; padding: 0.8rem; gap: 0.6rem; }
        }
    </style>
</head>
<body>

<div id="desktop-source-drawer" class="flex flex-col text-left">
    <div class="p-6 border-b flex justify-between items-center bg-zinc-50">
        <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-widest">知识库</h3>
        <button onclick="toggleDesktopReference()" class="text-zinc-400 hover:text-black">关闭</button>
    </div>
    <div id="textbook-content" class="flex-1 overflow-y-auto p-8 text-sm leading-relaxed text-zinc-600 font-serif no-scrollbar">正在加载...</div>
</div>

<div id="desktopLayout" class="desktop-layout">
    <header class="h-8 flex justify-between items-center px-2">
        <div class="flex items-center gap-4 text-left">
            <div class="flex flex-col cursor-pointer" onclick="goHome()">
                <span class="text-base font-bold tracking-widest font-serif uppercase text-zinc-800">LogosNik</span>
                <span class="text-[8px] font-bold text-zinc-400 -mt-1 uppercase">Terminal </span>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-[8px] font-mono text-zinc-400 mr-2 border-r pr-3 border-zinc-200">36°03'N 103°48'E | <span id="timestamp"></span></span>
            <button onclick="createNewNote()" class="px-3 py-1 bg-zinc-800 text-white rounded-full text-[9px] font-bold hover:bg-black transition-all">+ 新建</button>
            <button onclick="runAutoWorkshop()" class="px-4 py-1 bg-blue-600 text-white rounded-full text-[9px] font-bold shadow-md hover:bg-blue-700">人格合议</button>
            <label class="cursor-pointer text-[9px] px-3 py-1 bg-zinc-200 rounded-full font-bold uppercase hover:bg-zinc-300">Upload<input type="file" class="hidden" onchange="handleFileUpload(event)"></label>
            <button onclick="exportMarkdown()" class="text-[9px] px-3 py-1 bg-green-600 text-white rounded-full font-bold uppercase">Export</button>
            <button onclick="openSettings()" class="p-1 text-zinc-400">⚙️</button>
        </div>
    </header>

    <div class="flex-1 flex gap-4 overflow-hidden">
        <aside class="w-60 bg-white/50 backdrop-blur rounded-xl p-4 border flex flex-col overflow-hidden text-left shadow-sm">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">Analysis / 评审</h3>
                <button onclick="openHistory()" class="text-[9px] font-bold text-blue-500 uppercase">库</button>
            </div>
            <div id="workshop-toggles" class="grid grid-cols-2 gap-1 mb-4 pb-2 border-b border-zinc-100"></div>
            <div id="points-list" class="flex-1 overflow-y-auto no-scrollbar"></div>
        </aside>

        <main class="flex-1 flex flex-col gap-2 overflow-hidden text-left">
            <div class="notebook-case flex-1 flex flex-col overflow-hidden relative">
                <div class="p-4 border-b bg-white/50 flex items-center justify-between h-12">
                    <input type="text" id="note-title" placeholder="拟演课题..." class="text-lg font-bold bg-transparent outline-none font-serif w-full">
                    <span id="save-indicator" class="text-[8px] text-green-500 font-bold opacity-0 transition-opacity uppercase">Synced</span>
                </div>
                <div class="flex-1 overflow-y-auto notebook-paper p-10 no-scrollbar">
                    <textarea id="note-editor" oninput="saveCurrentNote()" class="w-full h-full bg-transparent border-none outline-none text-zinc-700 resize-none text-[17px] leading-[2.5rem]" placeholder="在此捕捉存在真相..."></textarea>
                </div>
            </div>
            <div class="h-16 bg-white/60 backdrop-blur rounded-lg border p-2 flex flex-col">
                <div class="flex justify-between items-center px-1 mb-1">
                    <span class="text-[8px] font-bold text-zinc-400 uppercase">Fragments / 灵感碎片池</span>
                    <button onclick="addFragment()" class="text-[8px] text-blue-600 font-bold">+ 记录</button>
                </div>
                <div id="fragment-container" class="flex-1 flex gap-2 overflow-x-auto no-scrollbar items-center px-1"></div>
            </div>
        </main>

        <aside class="w-72 flex flex-col gap-3 overflow-hidden text-left">
            <div class="flex-1 bg-zinc-900 rounded-3xl p-5 text-white flex flex-col shadow-xl overflow-hidden relative border border-white/5">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest flex items-center gap-1">Nik Assistant</span>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleDesktopReference()" class="p-1 text-zinc-400 hover:text-white transition-all">📚</button>
                        <select id="chat-personality" class="bg-zinc-800 text-[8px] font-bold text-blue-400 px-1 py-0.5 rounded outline-none border-none cursor-pointer" onchange="updateChatPlaceholder()">
                            <option value="ch1">文学 [跳跃]</option>
                            <option value="ch2">引擎 [稳健]</option>
                            <option value="ch3">哲学 [跳跃]</option>
                            <option value="ch4">公文 [稳健]</option>
                        </select>
                    </div>
                </div>
                <div id="chat-history" class="flex-1 overflow-y-auto text-[11px] mb-3 space-y-4 no-scrollbar opacity-80 font-light pr-1"></div>
                <div class="relative pt-3 border-t border-white/10">
                    <textarea id="chat-input" rows="1" onkeypress="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); askNik(); }" class="w-full bg-white/5 rounded-lg p-2 text-[11px] outline-none transition-all resize-none" placeholder="输入指令..."></textarea>
                </div>
            </div>
        </aside>
    </div>
</div>

<!-- ==================== 手机端 ==================== -->
<div id="mobileLayout" class="mobile-layout" style="display: none;">
    <div class="mobile-header flex justify-between items-center">
        <div class="flex flex-col leading-none text-left">
            <span class="font-serif font-bold text-sm tracking-tight text-zinc-800">LogosNik</span>
            <span class="text-[7px] font-mono text-zinc-400 uppercase mt-0.5"><span class="mobile-time"></span> | 36°03'N 103°48'E</span>
        </div>
        <div class="flex gap-1.5">
            <button onclick="createNewNote()" class="px-2 py-1 bg-zinc-100 rounded-full text-[9px] font-bold">新建</button>
            <button onclick="runAutoWorkshop()" class="px-3 py-1 bg-blue-600 text-white rounded-full text-[9px] font-bold">合议</button>
            <button onclick="openSettings()" class="p-1 text-zinc-500">⚙️</button>
        </div>
    </div>
    <div class="mobile-notebook">
        <div class="notebook-case h-full flex flex-col overflow-hidden">
            <div class="p-3 border-b bg-white/80 flex justify-between items-center h-10">
                <input type="text" id="mobileNoteTitle" placeholder="无标题" class="w-full font-bold bg-transparent outline-none text-sm">
            </div>
            <div class="flex-1 overflow-y-auto p-4 mobile-editor-paper no-scrollbar bg-[#fdfdfb]">
                <textarea id="mobileNoteEditor" oninput="saveCurrentNoteMobile()" class="w-full h-full bg-transparent border-none outline-none text-zinc-700 resize-none min-h-[400px]" placeholder="开始记录..."></textarea>
            </div>
            <div id="mobileFragmentContainer" class="h-10 bg-zinc-50 border-t flex gap-2 items-center px-3 overflow-x-auto no-scrollbar"></div>
        </div>
    </div>
    <div class="mobile-btn-float btn-analysis" onclick="toggleLeftPanel()">📑</div>
    <div class="mobile-btn-float btn-lib" onclick="toggleRightPanel()">📚</div>
    <div class="mobile-btn-float btn-chat" onclick="openMobileChat()">Nik</div>

    <div id="mobileLeftPanel" class="mobile-side-panel flex flex-col text-left">
        <div class="p-3 border-b flex justify-between items-center bg-zinc-50">
            <span class="font-bold text-[10px] uppercase font-serif">合议筛选与评审</span>
            <button onclick="toggleLeftPanel()" class="text-zinc-400 text-xs">关闭</button>
        </div>
        <div id="mobile-workshop-toggles" class="p-3 grid grid-cols-2 gap-2 border-b bg-zinc-50/50"></div>
        <div id="mobilePointsList" class="flex-1 overflow-y-auto p-4"></div>
    </div>
    <div id="mobileRightPanel" class="mobile-side-panel flex flex-col text-left">
        <div class="p-3 border-b flex justify-between items-center bg-zinc-50">
            <span class="font-bold text-[10px] uppercase font-serif">知识库</span>
            <button onclick="toggleRightPanel()" class="text-zinc-400 text-xs">关闭</button>
        </div>
        <div id="mobileTextbookContent" class="flex-1 overflow-y-auto p-4 text-sm text-zinc-600 font-serif leading-relaxed"></div>
    </div>
</div>

<!-- 手机端对话层 -->
<div id="mobile-chat-modal" class="flex-col">
    <div class="p-4 border-b border-white/10 flex justify-between items-center text-white">
        <div class="flex items-center gap-2">
            <span class="font-serif font-bold text-lg">Assistant</span>
            <select id="mobile-chat-personality" class="bg-zinc-800 text-[9px] font-bold text-blue-400 px-2 py-1 rounded border-none outline-none" onchange="updateChatPlaceholder()">
                <option value="ch1">文学 [跳跃]</option>
                <option value="ch2">引擎 [稳健]</option>
                <option value="ch3">哲学 [跳跃]</option>
                <option value="ch4">公文 [稳健]</option>
            </select>
        </div>
        <button onclick="closeMobileChat()" class="text-zinc-400">关闭</button>
    </div>
    <div id="mobileChatHistory" class="p-4 space-y-6"></div>
    <div class="p-4 border-t border-white/10 flex gap-2 items-end bg-black">
        <textarea id="mobileChatInput" rows="2" class="flex-1 bg-white/5 rounded-xl p-3 text-sm text-white outline-none resize-none" placeholder="输入指令..."></textarea>
        <button onclick="askNikMobile()" class="bg-blue-600 rounded-xl px-5 py-3 font-bold text-sm text-white">发送</button>
    </div>
</div>

<script>
    // --- 核心配置 ---
    let multiConfig = JSON.parse(localStorage.getItem('ln_multi_config_v6')) || {
        ch1: { label: '文学', mode: 'cloud', enabled: true, temp: 0.9, prompt: '跳跃灵感人格：以村上春树式的冷峻文风进行评审或创作。', cloud: { host: 'https://api.siliconflow.cn/v1', model: 'deepseek-ai/DeepSeek-V3', key: '' }, local: { host: 'http://localhost:11434/v1', model: 'gemma2', key: 'ollama' } },
        ch2: { label: '引擎', mode: 'cloud', enabled: true, temp: 0.3, prompt: '稳健执行人格：核心在于事实核查与逻辑严密。修正文字校对错误。', cloud: { host: 'https://api.siliconflow.cn/v1', model: 'deepseek-ai/DeepSeek-V3', key: '' }, local: { host: 'http://localhost:11434/v1', model: 'llama3', key: 'ollama' } },
        ch3: { label: '哲学', mode: 'cloud', enabled: true, temp: 0.9, prompt: '跳跃灵感人格：萨特存在主义视角。审计内容中的“自欺”逻辑。', cloud: { host: 'https://api.moonshot.cn/v1', model: 'moonshot-v1-8k', key: '' }, local: { host: 'http://localhost:11434/v1', model: 'qwen2', key: 'ollama' } },
        ch4: { label: '公文', mode: 'local', enabled: false, temp: 0.2, prompt: '稳健执行人格：中国党政机关公文风格。严谨、客观、符合行政规范。', cloud: { host: '', model: '', key: '' }, local: { host: 'http://localhost:11434/v1', model: 'gemma2', key: 'ollama' } }
    };

    let globalConfig = JSON.parse(localStorage.getItem('ln_global_config')) || { userName: 'Researcher' };
    let warehouse = JSON.parse(localStorage.getItem('ln_warehouse_v16')) || [];
    let currentId = localStorage.getItem('ln_current_id') || null;
    let chatMemories = JSON.parse(localStorage.getItem('ln_chat_memories_v3')) || {};

    // --- 核心：API 调用与学习注入 ---
    async function universalApiCall(text, configObj, isChat = false) {
        const active = configObj.mode === 'cloud' ? configObj.cloud : configObj.local;
        if (!active.key || !active.host) return `${configObj.label}未配置`;

        const currentItem = warehouse.find(i => i.id == currentId);
        let systemPrompt = configObj.prompt;
        if (currentItem && currentItem.textbook && currentItem.textbook.length > 5) {
            systemPrompt += `\n\n【参考背景学习资料】：\n${currentItem.textbook.substring(0, 3000)}`;
        }

        let messages = [{ role: "system", content: systemPrompt }];
        if (isChat && currentId) {
            const history = chatMemories[currentId] || [];
            messages = messages.concat(history.slice(-10));
        }
        messages.push({ role: "user", content: text });

        try {
            const response = await fetch(`${active.host.replace(/\/$/, '')}/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${active.key.trim()}` },
                body: JSON.stringify({ 
                    model: active.model, 
                    messages, 
                    stream: false,
                    temperature: configObj.temp || 0.7 
                })
            });
            const data = await response.json();
            return data.choices?.[0]?.message?.content || "模型无响应";
        } catch (e) { return `${configObj.label}通信中断`; }
    }

    // --- 状态显示逻辑 ---
    function appendThinking(containerId) {
        const h = document.getElementById(containerId);
        const d = document.createElement('div');
        d.id = 'thinking-bubble';
        d.className = "p-3 bg-white/5 rounded-xl border border-blue-500/20 mb-4 animate-pulse";
        d.innerHTML = `<span class="font-bold opacity-30 uppercase text-[8px] block mb-1 text-blue-400">LogosNik</span>
            <div class="text-[11px] text-zinc-500 italic">正在深度拟演中，请主编稍候...</div>`;
        h.appendChild(d);
        h.scrollTop = h.scrollHeight;
    }
    function removeThinking() {
        const bubble = document.getElementById('thinking-bubble');
        if(bubble) bubble.remove();
    }

    // --- 对话逻辑 ---
    async function askNik() {
        const i = document.getElementById('chat-input'); const p = document.getElementById('chat-personality').value;
        const v = i.value.trim(); if(!v) return;
        appendChat('Me', v, 'chat-history'); i.value = '';
        appendThinking('chat-history');
        const res = await universalApiCall(v, multiConfig[p], true);
        removeThinking();
        appendChat(multiConfig[p].label, res, 'chat-history');
        updateMemory(currentId, v, res);
    }
    async function askNikMobile() {
        const i = document.getElementById('mobileChatInput'); const p = document.getElementById('mobile-chat-personality').value;
        const v = i.value.trim(); if(!v) return;
        appendChatMobile('Me', v, 'mobileChatHistory'); i.value = '';
        appendThinking('mobileChatHistory');
        const res = await universalApiCall(v, multiConfig[p], true);
        removeThinking();
        appendChatMobile(multiConfig[p].label, res, 'mobileChatHistory');
        updateMemory(currentId, v, res);
    }

    // --- 合议逻辑 ---
    async function runAutoWorkshop() {
        const ed = document.getElementById(window.innerWidth<=768 ? 'mobileNoteEditor' : 'note-editor');
        if(!ed.value.trim()) return;
        const ptsDiv = document.getElementById(window.innerWidth<=768 ? 'mobilePointsList' : 'points-list');
        ptsDiv.innerHTML = '<div class="p-8 text-[10px] animate-pulse text-center uppercase tracking-widest text-zinc-400">主编请稍候，多机位合议中...</div>';
        if(window.innerWidth<=768) toggleLeftPanel();
        const activeIds = Object.keys(multiConfig).filter(id => multiConfig[id].enabled);
        const results = await Promise.all(activeIds.map(id => universalApiCall(ed.value, multiConfig[id])));
        ptsDiv.innerHTML = results.map((res, i) => {
            const conf = multiConfig[activeIds[i]];
            return `<div class="point-card group">
                <span class="text-[8px] font-bold text-zinc-400 uppercase">${conf.label}建议</span>
                <div class="text-[12px] text-zinc-700 analysis-text mt-1 leading-relaxed font-serif">${res}</div>
                <div class="mt-3 flex gap-2">
                    <button onclick="applyToEditor(this, 'replace')" class="text-[8px] bg-blue-600 px-2 py-1 rounded text-white font-bold uppercase">接管</button>
                    <button onclick="applyToEditor(this, 'append')" class="text-[8px] bg-zinc-200 px-2 py-1 rounded font-bold uppercase">追加</button>
                </div>
            </div>`;
        }).join('');
    }

    // --- 备份还原 ---
    function exportLabBackup() {
        const data = { warehouse, multiConfig, globalConfig, chatMemories, ver: '17.5' };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `LogosNik_Backup.json`; a.click();
    }
    function importLabBackup(ev) {
        const f = ev.target.files[0]; if(!f) return;
        const r = new FileReader(); r.onload = (e) => {
            const d = JSON.parse(e.target.result);
            if(confirm("确定覆盖数据吗？")) {
                localStorage.setItem('ln_warehouse_v16', JSON.stringify(d.warehouse));
                localStorage.setItem('ln_multi_config_v6', JSON.stringify(d.multiConfig));
                localStorage.setItem('ln_chat_memories_v3', JSON.stringify(d.chatMemories));
                location.reload();
            }
        }; r.readAsText(f);
    }

    // --- 基础辅助 ---
    function applyToEditor(btn, mode) {
        const txt = btn.parentElement.parentElement.querySelector('.analysis-text').innerText;
        const ed = document.getElementById(window.innerWidth<=768 ? 'mobileNoteEditor' : 'note-editor');
        if(mode==='replace' && confirm("覆盖当前正文？")) ed.value = txt; else ed.value += `\n\n${txt}`;
        saveCurrentNote(); if(window.innerWidth<=768) closeMobileChat();
    }
    function saveCurrentNote() {
        const itm = warehouse.find(i => i.id == currentId);
        if(itm) { itm.note = document.getElementById('note-editor').value; itm.noteTitle = document.getElementById('note-title').value; localStorage.setItem('ln_warehouse_v16', JSON.stringify(warehouse)); showSaveIndicator(); }
    }
    function saveCurrentNoteMobile() {
        const itm = warehouse.find(i => i.id == currentId);
        if(itm) { itm.note = document.getElementById('mobileNoteEditor').value; itm.noteTitle = document.getElementById('mobileNoteTitle').value; localStorage.setItem('ln_warehouse_v16', JSON.stringify(warehouse)); }
    }
    function showSaveIndicator() { const el = document.getElementById('save-indicator'); el.style.opacity='1'; setTimeout(()=>el.style.opacity='0', 1000); }
    function loadFromWarehouse(id) {
        const itm = warehouse.find(i => i.id == id); if(!itm) return;
        currentId = id; localStorage.setItem('ln_current_id', id);
        document.getElementById('note-title').value = itm.noteTitle || '';
        document.getElementById('note-editor').value = itm.note || '';
        document.getElementById('textbook-content').innerHTML = itm.textbook || '';
        document.getElementById('mobileNoteTitle').value = itm.noteTitle || '';
        document.getElementById('mobileNoteEditor').value = itm.note || '';
        document.getElementById('mobileTextbookContent').innerHTML = itm.textbook || '';
        renderFragments(itm.fragments); renderCurrentChatHistory();
    }
    function updateMemory(cid, u, a) {
        if(!cid) return; if(!chatMemories[cid]) chatMemories[cid]=[];
        chatMemories[cid].push({role:"user",content:u},{role:"assistant",content:a});
        if(chatMemories[cid].length>20) chatMemories[cid]=chatMemories[cid].slice(-20);
        localStorage.setItem('ln_chat_memories_v3', JSON.stringify(chatMemories));
    }
    function renderCurrentChatHistory() {
        const c = document.getElementById('chat-history'); const m = document.getElementById('mobileChatHistory');
        if(c) c.innerHTML = ''; if(m) m.innerHTML = ''; (chatMemories[currentId] || []).forEach(msg => {
            const role = msg.role === 'user' ? 'Me' : 'Assistant';
            appendChat(role, msg.content, 'chat-history'); appendChatMobile(role, msg.content, 'mobileChatHistory');
        });
    }
    function appendChat(r, m, id) {
        const h = document.getElementById(id); if(!h) return; const d = document.createElement('div');
        d.className="p-3 bg-white/5 rounded-xl border border-white/5 mb-4 transition-all hover:border-blue-500/20";
        d.innerHTML=`<span class="font-bold opacity-30 uppercase text-[8px] block mb-1 text-blue-400">${r}</span><div class="analysis-text leading-relaxed">${m}</div><div class="mt-2 flex gap-2"><button onclick="applyToEditor(this, 'replace')" class="text-[8px] bg-blue-600 px-2 py-1 rounded text-white font-bold">接管</button><button onclick="applyToEditor(this, 'append')" class="text-[8px] bg-zinc-700 px-2 py-1 rounded text-white font-bold">追加</button></div>`;
        h.appendChild(d); h.scrollTop = h.scrollHeight;
    }
    function appendChatMobile(r, m, id) {
        const h = document.getElementById(id); if(!h) return; const d = document.createElement('div');
        d.className="p-4 bg-white/5 rounded-xl border border-white/5 mb-4";
        d.innerHTML=`<span class="font-bold opacity-40 uppercase text-[8px] text-blue-400 block mb-1">${r}</span><div class="text-[14px] leading-relaxed analysis-text text-zinc-300 font-serif">${m}</div><div class="mt-3 flex gap-3"><button onclick="applyToEditor(this, 'replace')" class="text-[10px] bg-blue-600 px-3 py-1.5 rounded font-bold">接管</button><button onclick="applyToEditor(this, 'append')" class="text-[10px] bg-zinc-700 px-3 py-1.5 rounded font-bold">追加</button></div>`;
        h.appendChild(d); h.scrollTop = h.scrollHeight;
    }
    function createNewNote() {
        if(confirm("开启新稿件？")) {
            const nid = Date.now();
            warehouse.unshift({ id: nid, title: '', noteTitle: '', note: '', textbook: '参考资料待上传...', fragments: [] });
            currentId = nid; localStorage.setItem('ln_warehouse_v16', JSON.stringify(warehouse));
            localStorage.setItem('ln_current_id', nid); loadFromWarehouse(nid);
        }
    }
    function renderWorkshopControls() {
        const html = Object.keys(multiConfig).map(id => `<label class="flex items-center gap-1.5 p-1 cursor-pointer"><input type="checkbox" class="w-3 h-3 accent-black" ${multiConfig[id].enabled?'checked':''} onchange="toggleWorkshopPersona('${id}', this.checked)"><span class="text-[9px] font-bold text-zinc-500 uppercase">${multiConfig[id].label}${multiConfig[id].temp > 0.5 ? '⚡' : '🛡️'}</span></label>`).join('');
        document.getElementById('workshop-toggles').innerHTML = html;
        const m = document.getElementById('mobile-workshop-toggles'); if(m) m.innerHTML = html;
    }
    function toggleWorkshopPersona(id, val) { multiConfig[id].enabled = val; localStorage.setItem('ln_multi_config_v6', JSON.stringify(multiConfig)); }
    function toggleDesktopReference() { document.getElementById('desktop-source-drawer').classList.toggle('active'); }
    function openMobileChat() { document.getElementById('mobile-chat-modal').classList.add('active'); renderCurrentChatHistory(); }
    function closeMobileChat() { document.getElementById('mobile-chat-modal').classList.remove('active'); }
    function toggleLeftPanel() { document.getElementById('mobileLeftPanel').classList.toggle('active'); }
    function toggleRightPanel() { document.getElementById('mobileRightPanel').classList.toggle('active'); }
    function addFragment() { document.getElementById('fragment-modal').classList.remove('hidden'); }
    function closeFragmentModal() { document.getElementById('fragment-modal').classList.add('hidden'); }
    function saveFragment() {
        const i = document.getElementById('fragment-input'); const itm = warehouse.find(x => x.id == currentId);
        if(itm && i.value.trim()) { if(!itm.fragments) itm.fragments=[]; itm.fragments.push({id:Date.now(), content:i.value.trim()}); localStorage.setItem('ln_warehouse_v16', JSON.stringify(warehouse)); renderFragments(itm.fragments); }
        i.value = ''; closeFragmentModal();
    }
    function renderFragments(frs) {
        const html = (frs || []).map(f => `<div class="fragment-pill" onclick="adoptFragment('${f.content.replace(/'/g, "\\'")}')">${f.content.substring(0, 8)}..</div>`).join('');
        document.getElementById('fragment-container').innerHTML = html;
        const m = document.getElementById('mobileFragmentContainer'); if(m) m.innerHTML = html;
    }
    function adoptFragment(c) { const ed = document.getElementById(window.innerWidth<=768 ? 'mobileNoteEditor' : 'note-editor'); ed.value += `\n\n${c}`; saveCurrentNote(); }
    function updateTime() {
        const n = new Date(); const s = n.toLocaleTimeString('zh-CN', {hour12:false});
        if(document.getElementById('timestamp')) document.getElementById('timestamp').innerText=s;
        const mt=document.querySelector('.mobile-time'); if(mt) mt.innerText=s;
    }
    function checkScreenSize() { const isM = window.innerWidth <= 768; document.getElementById('desktopLayout').style.display = isM ? 'none' : 'flex'; document.getElementById('mobileLayout').style.display = isM ? 'flex' : 'none'; }
    function openSettings() { renderSettingsUI(); document.getElementById('set-user-name').value = globalConfig.userName; document.getElementById('settings-modal').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
    function renderSettingsUI() {
        const container = document.getElementById('multi-configs-container');
        container.innerHTML = Object.keys(multiConfig).map(id => {
            const conf = multiConfig[id];
            return `<div class="p-4 bg-zinc-50 rounded-xl border mb-3 text-left shadow-inner"><div class="flex justify-between items-center mb-2"><input id="${id}-label" class="font-bold text-xs bg-transparent border-b w-20 outline-none" value="${conf.label}"><div class="flex bg-zinc-200 rounded-full p-1 text-[8px]"><button onclick="switchMode('${id}', 'cloud')" class="px-2 py-0.5 rounded-full ${conf.mode==='cloud'?'bg-white shadow-sm font-bold':''}">云端</button><button onclick="switchMode('${id}', 'local')" class="px-2 py-0.5 rounded-full ${conf.mode==='local'?'bg-white shadow-sm font-bold':''}">本地</button></div></div><div class="${conf.mode==='cloud'?'block':'hidden'} space-y-1"><input id="${id}-cloud-host" class="w-full p-1.5 border rounded text-[10px]" value="${conf.cloud.host}"><div class="flex gap-2"><input id="${id}-cloud-model" class="w-1/2 p-1.5 border rounded text-[10px]" value="${conf.cloud.model}"><input id="${id}-cloud-key" type="password" class="w-1/2 p-1.5 border rounded text-[10px]" value="${conf.cloud.key}"></div></div><div class="${conf.mode==='local'?'block':'hidden'} space-y-1"><input id="${id}-local-host" class="w-full p-1.5 border rounded text-[10px]" value="${conf.local.host}"><input id="${id}-local-model" class="w-full p-1.5 border rounded text-[10px]" value="${conf.local.model}"></div><div class="mt-2 flex items-center justify-between"><label class="text-[9px] font-bold text-zinc-400">属性倾向 (0.1稳-1跳)</label><input type="range" id="${id}-temp" min="0.1" max="1.0" step="0.1" value="${conf.temp}" class="w-24 accent-black"></div><textarea id="${id}-prompt" class="w-full mt-2 p-1.5 border rounded text-[10px] h-12 bg-white resize-none outline-none font-serif">${conf.prompt}</textarea></div>`;
        }).join('');
    }
    function switchMode(id, mode) { multiConfig[id].mode = mode; renderSettingsUI(); }
    function saveMultiSettings() {
        Object.keys(multiConfig).forEach(id => {
            multiConfig[id].label = document.getElementById(`${id}-label`).value;
            multiConfig[id].prompt = document.getElementById(`${id}-prompt`).value;
            multiConfig[id].temp = parseFloat(document.getElementById(`${id}-temp`).value);
            multiConfig[id].cloud.host = document.getElementById(`${id}-cloud-host`).value;
            multiConfig[id].cloud.model = document.getElementById(`${id}-cloud-model`).value;
            multiConfig[id].cloud.key = document.getElementById(`${id}-cloud-key`).value;
            multiConfig[id].local.host = document.getElementById(`${id}-local-host`).value;
            multiConfig[id].local.model = document.getElementById(`${id}-local-model`).value;
        });
        localStorage.setItem('ln_multi_config_v6', JSON.stringify(multiConfig));
        localStorage.setItem('ln_global_config', JSON.stringify({ userName: document.getElementById('set-user-name').value }));
        location.reload();
    }
    function handleFileUpload(ev) {
        const f = ev.target.files[0]; if(!f) return; const r = new FileReader();
        r.onload = (e) => {
            const ni = { id: Date.now(), title: f.name, noteTitle: f.name, textbook: e.target.result, note: '', fragments: [] };
            warehouse.unshift(ni); localStorage.setItem('ln_warehouse_v16', JSON.stringify(warehouse));
            loadFromWarehouse(ni.id);
        }; r.readAsText(f);
    }
    function exportMarkdown() {
        const itm = warehouse.find(i => i.id == currentId); if(!itm) return;
        const b = new Blob([`# ${itm.noteTitle || 'Untitled'}\n\n${itm.note}`], { type: 'text/markdown' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `${itm.noteTitle || 'note'}.md`; a.click();
    }
    function openHistory() { renderHistory(); document.getElementById('history-modal').classList.remove('hidden'); }
    function closeHistory() { document.getElementById('history-modal').classList.add('hidden'); }
    function renderHistory() {
        document.getElementById('warehouse-list').innerHTML = warehouse.map(i => `<div class="flex justify-between items-center mb-2 p-3 bg-zinc-50 rounded-xl group transition-all"><div onclick="loadFromWarehouse(${i.id});closeHistory()" class="flex-1 cursor-pointer text-xs font-bold font-serif">${i.noteTitle || i.title || 'Untitled'}</div><button onclick="deleteNote(${i.id})" class="text-red-400 px-2 text-[10px]">删除</button></div>`).join('');
    }
    function deleteNote(id) { if(confirm("永久删除？")) { warehouse = warehouse.filter(x => x.id != id); localStorage.setItem('ln_warehouse_v16', JSON.stringify(warehouse)); goHome(); renderHistory(); } }
    function goHome() { if(warehouse.length) loadFromWarehouse(warehouse[0].id); }
    function updateChatPlaceholder() {
        const isM = window.innerWidth<=768; const p = document.getElementById(isM ? 'mobile-chat-personality' : 'chat-personality').value;
        const input = document.getElementById(isM ? 'mobileChatInput' : 'chat-input');
        if(input) input.placeholder = `正在点名 [${multiConfig[p].label}] 创作...`;
    }
    function init() {
        if(!warehouse.length) warehouse = [{ id: 1, title: '初始底稿', noteTitle: '', note: '', textbook: '参考资料待上传...', fragments: [] }];
        if(!currentId) currentId = warehouse[0].id;
        loadFromWarehouse(currentId);
        setInterval(updateTime, 1000); updateTime(); updateChatPlaceholder();
        renderWorkshopControls(); checkScreenSize(); window.addEventListener('resize', checkScreenSize);
    }
    window.onload = init;
</script>

<!-- 配置中心 -->
<div id="settings-modal" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeSettings()">
    <div class="bg-white rounded-3xl max-w-xl w-full p-6 m-4 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 class="font-bold mb-4 font-serif text-lg text-left">实验室机位与倾向配置</h3>
        <div id="multi-configs-container"></div>
        <div class="mt-4 pt-4 border-t text-left">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="exportLabBackup()" class="py-3 bg-zinc-100 rounded-xl text-[10px] font-bold hover:bg-zinc-200">备份全量仓库</button>
                <label class="py-3 bg-zinc-100 rounded-xl text-[10px] font-bold text-center cursor-pointer hover:bg-zinc-200">还原全量仓库<input type="file" class="hidden" onchange="importLabBackup(event)"></label>
            </div>
            <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">主编署名</label>
            <input id="set-user-name" class="w-full p-2 border rounded-xl mt-1 outline-none text-sm font-bold bg-zinc-50" placeholder="Researcher">
            <button onclick="saveMultiSettings()" class="w-full mt-4 py-3 bg-black text-white rounded-2xl font-bold shadow-xl">同步配置并重载</button>
        </div>
    </div>
</div>

<div id="history-modal" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeHistory()">
    <div class="bg-white rounded-3xl max-w-sm w-full p-6 m-4 shadow-2xl text-left">
        <h3 class="font-bold mb-4 font-serif text-lg border-b pb-2 tracking-widest">底稿档案中心</h3>
        <div id="warehouse-list" class="max-h-96 overflow-y-auto no-scrollbar"></div>
    </div>
</div>

<div id="fragment-modal" class="fixed inset-0 z-[300] bg-black/40 backdrop-blur flex items-center justify-center hidden" onclick="if(event.target===this) closeFragmentModal()">
    <div class="bg-white rounded-2xl max-w-sm w-full p-5 m-4 shadow-2xl text-left">
        <h4 class="font-bold text-sm mb-3">捕捉闪念碎片</h4>
        <textarea id="fragment-input" class="w-full h-32 p-3 border rounded-xl text-sm outline-none resize-none"></textarea>
        <button onclick="saveFragment()" class="w-full mt-4 py-3 bg-black text-white rounded-xl font-bold">存档</button>
    </div>
</div>

</body>
</html>
